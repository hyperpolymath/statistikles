name: GitHub Pages (Ddraig SSG)
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/stefan-hoeck/idris2-pack@sha256:f0758996a931fb35d9ecb1de273c4d59dabe2a09b433afc7e357f65a08b7e1ff
    steps:
      - name: Checkout Site
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Checkout Ddraig SSG
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: hyperpolymath/ddraig-ssg
          path: .ddraig-ssg
      - name: Compile Ddraig
        working-directory: .ddraig-ssg
        run: idris2 Ddraig.idr -o ddraig
      - name: Build site
        run: |
          mkdir -p src
          if [ ! -f src/index.md ] && [ -f README.md ]; then
            cp README.md src/index.md
          elif [ ! -f src/index.md ]; then
            echo "# ${GITHUB_REPOSITORY}" > src/index.md
          fi
          ./.ddraig-ssg/build/exec/ddraig build src _site https://hyperpolymath.github.io/${GITHUB_REPOSITORY#*/}
      - name: Upload artifact
        # Pinned at exactly what `@v3` resolved to, NOT bumped to v5. v5 swaps its
        # internal actions/upload-artifact v4 -> v7, changing the artifact format fed
        # to deploy-pages below — and deploy-pages cannot be exercised at all until
        # Pages is enabled on this repo (it 404s), so that upgrade is untestable here.
        # Upgrade both halves of the pair together once Pages is on. See issue #32 area.
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: '_site'
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # Matched pair with upload-pages-artifact v3 above; pinned at the current `@v4`
        # resolution. v5 exists (node20 -> node24) but this step cannot run until Pages
        # is enabled, so bumping it would be an unverifiable change.
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
