#
# Statistikles — E2E + Aspect Tests
#
# Runs the Julia test suite (693 @test assertions, 10 Agda proofs, 8 integrations).

name: E2E + Aspect

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'test/**'
      - 'Project.toml'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-julia:
    name: E2E — Julia Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup Julia
        uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32  # v2
        with:
          version: '1.10'

      - name: Julia cache
        uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38  # v3.1.0

      - name: Run Julia tests (with coverage)
        run: julia --project=. -e 'using Pkg; Pkg.test(coverage=true)'

      - name: Process coverage → lcov
        uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38  # v1.2.2

      - name: Coverage summary
        if: always()
        run: |
          if [ -f lcov.info ]; then
            TOTAL=$(grep -c '^DA:' lcov.info || true)
            HIT=$(awk -F'[:,]' '/^DA:/ && $3 > 0 { c++ } END { print c + 0 }' lcov.info)
            TOTAL=${TOTAL:-0}
            HIT=${HIT:-0}
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$(awk -v h="$HIT" -v t="$TOTAL" 'BEGIN { printf "%.2f", (h / t) * 100 }')
            else
              PCT="0.00"
            fi
            {
              echo "## Coverage (informational — not gated)"
              echo ""
              echo "Lines covered: **${HIT} / ${TOTAL}** (**${PCT}%**)"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No lcov.info was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: julia-coverage-lcov
          path: lcov.info
          if-no-files-found: warn

  aspect-safety:
    name: Aspect — Safety + SPDX
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: No dangerous patterns
        run: |
          DANGEROUS=$(grep -rn 'believe_me\|assert_total\|sorry\|Admitted' src/ 2>/dev/null || true)
          if [ -n "$DANGEROUS" ]; then
            echo "FAIL: Dangerous patterns"
            echo "$DANGEROUS"
            exit 1
          fi
          # Experimental Agda proofs must stay constructive — no postulates.
          PROOF_POSTULATES=$(grep -rnw --include='*.agda' 'postulate' proofs/ 2>/dev/null || true)
          if [ -n "$PROOF_POSTULATES" ]; then
            echo "FAIL: postulate found under proofs/"
            echo "$PROOF_POSTULATES"
            exit 1
          fi
          echo "PASS: No dangerous patterns"

      - name: SPDX headers
        run: |
          MISSING=0
          for f in $(find src/ -name "*.jl" | head -20); do
            if ! head -3 "$f" | grep -q "SPDX"; then
              MISSING=$((MISSING + 1))
            fi
          done
          echo "Missing SPDX: $MISSING (of 20 sampled)"
